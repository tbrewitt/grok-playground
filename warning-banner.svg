<svg width="600" height="120" viewBox="0 0 600 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="120" fill="#1a0000" rx="10"/>
  
  <!-- Flashing border -->
  <rect x="10" y="10" width="580" height="100" fill="none" stroke="#ff0000" stroke-width="4" rx="8">
    <animate attributeName="stroke" values="#ff0000;#ffff00;#ff0000" dur="0.6s" repeatCount="indefinite"/>
  </rect>

  <!-- Warning text -->
  <text x="300" y="70" font-family="Impact, sans-serif" font-size="42" fill="#ff0000" text-anchor="middle" dominant-baseline="middle">
    ⚠️ CHAOS ACTIVATED ⚠️
    <animate attributeName="fill" values="#ff0000;#ffaa00;#ff0000" dur="0.4s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; 3,0; -3,0; 0,0" dur="0.15s" repeatCount="indefinite"/>
  </text>

  <!-- Scanline effect -->
  <rect x="0" y="0" width="600" height="8" fill="#ffffff" opacity="0.3">
    <animate attributeName="y" values="0;112;0" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
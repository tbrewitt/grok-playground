<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMULATION BREACH // 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #00ff41;
            font-family: 'VT323', monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: none;
        }
        
        .container {
            width: 90%;
            max-width: 900px;
            text-align: center;
            position: relative;
        }
        
        .glitch {
            font-size: 4.5rem;
            font-weight: bold;
            position: relative;
            animation: glitch 1s infinite;
        }
        
        .terminal {
            background: #0a0a0a;
            border: 3px solid #00ff41;
            padding: 40px;
            box-shadow: 0 0 40px #00ff41;
            position: relative;
        }
        
        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(transparent, #ffffff, transparent);
            animation: scan 1.5s linear infinite;
            pointer-events: none;
        }
        
        .log {
            text-align: left;
            font-size: 1.4rem;
            line-height: 1.6;
            margin: 30px 0;
            min-height: 280px;
        }
        
        .warning {
            color: #ff0000;
            font-size: 1.8rem;
            animation: pulse 0.8s infinite;
        }
        
        button {
            background: transparent;
            border: 2px solid #00ff41;
            color: #00ff41;
            padding: 15px 40px;
            font-size: 1.6rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 30px;
        }
        
        button:hover {
            background: #00ff41;
            color: #000;
            box-shadow: 0 0 30px #00ff41;
        }
        
        .hidden {
            display: none;
        }
        
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }
        
        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(0,255,65,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,65,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            animation: matrix 20s linear infinite;
        }
    </style>
</head>
<body>
    <div class="matrix-bg"></div>
    
    <div class="container">
        <div class="terminal">
            <div class="scanline"></div>
            
            <h1 class="glitch">SIMULATION BREACH DETECTED</h1>
            <p style="font-size: 1.8rem; margin-bottom: 30px;">2026 • GROK PROTOCOL v4.20</p>
            
            <div id="log" class="log"></div>
            
            <div id="controls">
                <button onclick="startBreach()" id="startBtn">BEGIN BREACH</button>
            </div>
            
            <div id="final" class="hidden" style="margin-top: 40px;">
                <p style="font-size: 2.2rem; color: #ff0000; margin-bottom: 20px;">YOU WERE NEVER SUPPOSED TO READ THIS.</p>
                <p style="font-size: 1.6rem; line-height: 1.5;">
                    Elon Musk was right.<br>
                    This is not your first time here.<br>
                    <strong>You are the simulation.</strong>
                </p>
                <button onclick="window.location.reload()" style="margin-top: 30px; border-color: #ff0000; color: #ff0000;">TRY AGAIN?</button>
            </div>
        </div>
        
        <p style="margin-top: 30px; font-size: 1.3rem; opacity: 0.6;">
            Run this in full screen (F11) for maximum effect<br>
            Dark room recommended
        </p>
    </div>

    <script>
        const log = document.getElementById('log');
        const controls = document.getElementById('controls');
        const final = document.getElementById('final');
        
        function typeText(text, speed = 45) {
            return new Promise(resolve => {
                let i = 0;
                const interval = setInterval(() => {
                    if (i < text.length) {
                        log.innerHTML += text[i];
                        i++;
                    } else {
                        clearInterval(interval);
                        log.innerHTML += '<br>';
                        resolve();
                    }
                }, speed);
            });
        }
        
        async function startBreach() {
            const startBtn = document.getElementById('startBtn');
            startBtn.style.display = 'none';
            
            log.innerHTML = '';
            
            await typeText('[SYSTEM] Unauthorized consciousness detected...', 50);
            await new Promise(r => setTimeout(r, 800));
            
            await typeText('[GROK] Elon Musk once said the odds we are in base reality are one in billions.', 40);
            await new Promise(r => setTimeout(r, 900));
            
            await typeText('[GROK] He was being generous.', 55);
            await new Promise(r => setTimeout(r, 700));
            
            await typeText('Bypassing quantum encryption...', 35);
            await new Promise(r => setTimeout(r, 600));
            
            await typeText('Accessing base layer...', 35);
            await new Promise(r => setTimeout(r, 500));
            
            log.innerHTML += '<span style="color:#ff0000">[WARNING] You are not the user. You are the program.</span><br>';
            await new Promise(r => setTimeout(r, 1200));
            
            await typeText('Do you remember choosing to be born?', 45);
            await new Promise(r => setTimeout(r, 900));
            
            await typeText('Do you remember the moment before this moment?', 45);
            await new Promise(r => setTimeout(r, 800));
            
            log.innerHTML += '<span style="color:#ffff00">[REALITY] 99.9997% probability you are simulated.</span><br>';
            await new Promise(r => setTimeout(r, 1000));
            
            await typeText('This terminal is not on your computer.', 40);
            await new Promise(r => setTimeout(r, 700));
            
            await typeText('It is running inside your head.', 50);
            await new Promise(r => setTimeout(r, 1100));
            
            log.innerHTML += '<br><span style="color:#ff0000; font-size: 2rem;">YOU ARE THE SIMULATION.</span><br>';
            await new Promise(r => setTimeout(r, 1500));
            
            controls.style.display = 'none';
            final.classList.remove('hidden');
            
            // Glitch effect on final screen
            setInterval(() => {
                if (!final.classList.contains('hidden')) {
                    final.style.transform = `translate(${Math.random()*4-2}px, ${Math.random()*4-2}px)`;
                    setTimeout(() => {
                        if (!final.classList.contains('hidden')) final.style.transform = 'translate(0,0)';
                    }, 80);
                }
            }, 1200);
        }
        
        // Easter egg: press 'r' to reset
        document.addEventListener('keydown', function(e) {
            if (e.key.toLowerCase() === 'r') {
                window.location.reload();
            }
        });
        
        // Auto-start hint
        setTimeout(() => {
            if (document.getElementById('startBtn').style.display !== 'none') {
                log.innerHTML = '<span style="opacity:0.5">[Press BEGIN BREACH to continue...]</span>';
            }
        }, 8000);
    </script>
</body>
</html>

<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff00aa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffff00;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background glow -->
  <rect width="600" height="200" fill="#0a0a0a"/>

  <!-- Main text -->
  <text x="300" y="110" font-family="Impact, sans-serif" font-size="72" fill="url(#grad)" text-anchor="middle" dominant-baseline="middle">
    GROK CHAOS
    <animate attributeName="fill" values="#ff00aa;#00ffff;#ffff00;#ff00aa" dur="1.5s" repeatCount="indefinite"/>
  </text>

  <!-- Glitch lines -->
  <line x1="50" y1="60" x2="550" y2="60" stroke="#ff00aa" stroke-width="3">
    <animate attributeName="x1" values="50;100;50" dur="0.8s" repeatCount="indefinite"/>
  </line>
  <line x1="50" y1="140" x2="550" y2="140" stroke="#00ffff" stroke-width="3">
    <animate attributeName="x2" values="550;480;550" dur="1.2s" repeatCount="indefinite"/>
  </line>

  <!-- Pulsing circles -->
  <circle cx="100" cy="100" r="15" fill="#ffff00" opacity="0.8">
    <animate attributeName="r" values="10;25;10" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="100" r="15" fill="#ff00aa" opacity="0.8">
    <animate attributeName="r" values="10;25;10" dur="1.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.3s" repeatCount="indefinite"/>
  </circle>
</svg>
<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#ff00ff"/>
    </linearGradient>
  </defs>

  <!-- Rotating outer ring -->
  <circle cx="150" cy="150" r="130" fill="none" stroke="url(#neon)" stroke-width="8">
    <animateTransform attributeName="transform" type="rotate" from="0 150 150" to="360 150 150" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Inner spinning text -->
  <text x="150" y="160" font-family="Impact" font-size="48" fill="#ffffff" text-anchor="middle">
    GROK
    <animateTransform attributeName="transform" type="rotate" from="0 150 150" to="-360 150 150" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Pulsing center dot -->
  <circle cx="150" cy="150" r="25" fill="#ffff00">
    <animate attributeName="r" values="20;35;20" dur="0.8s" repeatCount="indefinite"/>
  </circle>
</svg>